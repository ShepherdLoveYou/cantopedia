id: 012-joeng4-zau1-caau2-faan6
menu_no: 12
names:
  yue_hant: 揚州炒飯
  jyutping: joeng4 zau1 caau2 faan6
  zh: 扬州炒饭
  en: Yangzhou Fried Rice
category: rice
ingredients:
  - ref: fried-rice-base
    qty: 2
    unit: 份
    prep:
      yue: 前一晚煮好嘅冷飯，用手揉散
      zh: 前一晚煮好的冷饭，用手揉散
      en: day-old cold cooked rice, broken up by hand
  - ref: shrimp-meat
    qty: 1
    unit: 份
    prep:
      yue: 拆殼去腸、用少少鹽同生粉抓勻
      zh: 拆壳去肠、用少许盐与生粉抓匀
      en: peeled, deveined, lightly salted and tossed with cornstarch
  - ref: cha-siu
    qty: 1
    unit: 份
    prep:
      yue: 切細粒
      zh: 切细粒
      en: finely diced
  - ref: chicken-balls
    qty: 1
    unit: 份
    prep:
      yue: 切細粒
      zh: 切细粒
      en: small dice
  - ref: green-peas
    qty: 1
    unit: 份
    prep:
      yue: 飛水 30 秒撈起過冷河
      zh: 飞水 30 秒后过冷水
      en: blanched 30 seconds, shocked in cold water
  - ref: scallion
    qty: 1
    unit: 份
    prep:
      yue: 切蔥花
      zh: 切葱花
      en: thinly sliced
  - ref: egg
    qty: 2
    unit: 個
    prep:
      yue: 打散加少少鹽
      zh: 打散加少许盐
      en: beaten with a pinch of salt
servings: 2
difficulty: medium
time_minutes:
  prep: 15
  cook: 8
equipment:
  - wok
method_status: complete
method:
  - order: 1
    body:
      yue: 隔夜冷飯用手揉散——粒粒分明先夠靚。鑊燒熱落 1 匙油，落蝦仁炒到變色撈起，再落雞粒同叉燒粒炒香撈起。
      zh: 隔夜冷饭用手揉散——粒粒分明才靓。锅烧热下 1 勺油，下虾仁炒至变色捞出，再下鸡粒与叉烧粒炒香捞出。
      en: Break up the cold rice by hand so every grain is separate. Heat the wok, add 1 Tbsp oil, sear the shrimp till just opaque and remove; then sear the chicken and char siu, remove.
    time_seconds: 120
  - order: 2
    body:
      yue: 鑊再落 1 匙油，倒入蛋液晃勻成蛋皮，未完全熟之前就落冷飯，用鏟撥散同蛋打勻，每粒米都裹住蛋汁。
      zh: 锅再下 1 勺油，倒入蛋液晃匀成蛋皮，未完全凝固时就下冷饭，用铲拨散与蛋拌匀，每粒米都裹上蛋汁。
      en: Add another 1 Tbsp oil, swirl in the egg, and just before it fully sets, dump in the cold rice. Toss aggressively so every grain is coated in egg ("金包銀" — golden coating on silver grains).
    time_seconds: 90
  - order: 3
    body:
      yue: 落番蝦仁、雞粒、叉燒粒、青豆，加 1 茶匙鹽、半茶匙糖、少少胡椒粉，鑊邊淋少少生抽炒勻。
      zh: 倒回虾仁、鸡粒、叉烧粒、青豆，加 1 茶匙盐、半茶匙糖、少许胡椒粉，锅边淋少许生抽翻炒均匀。
      en: Return all the proteins and the peas. Season with 1 tsp salt, ½ tsp sugar, white pepper, and drizzle a touch of light soy around the rim of the wok.
    time_seconds: 60
  - order: 4
    body:
      yue: 最後落蔥花，再快手翻 10 秒，蔥花剛剛斷生即上碟——蔥花太熟會冇香氣。
      zh: 最后撒入葱花，再快手翻 10 秒，葱花刚断生即出锅——葱花炒过头就没香气了。
      en: Finally toss in the scallion, give it 10 seconds, and plate immediately — overcooked scallion loses its fragrance.
    time_seconds: 10
tips:
  - yue: 「金包銀」係揚州炒飯嘅最高境界——每粒米外面包住一層薄薄嘅蛋黃，米粒粒分明、蛋黃唔結團，呢個係茶餐廳大廚嘅基本功。
    zh: 「金包银」是扬州炒饭的最高境界——每粒米外面包覆一层薄薄的蛋黄，米粒分明、蛋黄不结团，这是茶餐厅大厨的基本功。
    en: "金包銀" — golden wrapping silver — describes each rice grain individually coated in egg yolk, with no clumping or scrambled-egg lumps. It is the diagnostic skill for any Cantonese wok cook.
  - yue: 米一定要用隔夜冷飯——熱飯水份太多會結成「飯團」，炒咗會黐。即整即食可以將熱飯攤平喺托盤入冰箱半個鐘急凍降溫。
    zh: 米必须用隔夜冷饭——热饭水分太多会结成「饭团」，炒了会黏。临时做可将热饭摊平在托盘入冰箱速冻半小时降温。
    en: Use day-old cold rice — fresh hot rice has too much surface moisture and clumps. In a pinch, spread fresh rice on a sheet pan and chill in the freezer for 30 min before frying.
  - yue: 「揚州炒飯」其實同揚州冇直接關係——係 19 世紀廣州廚師整出嚟、用「揚州」呢個地名突顯精緻講究嘅意思，類似「淮揚菜」嘅文化定位。
    zh: 「扬州炒饭」其实与扬州没有直接关系——是 19 世纪广州厨师创制、借「扬州」之名突显精致讲究，类似「淮扬菜」的文化定位。
    en: Despite the name, "Yangzhou" fried rice has no direct origin in Yangzhou — it was invented by 19th-century Cantonese chefs who borrowed the city's name to signal refinement, much as "Continental cuisine" works in English.
history:
  yue: 揚州炒飯起源於 19 世紀廣州，據講係粵菜大師伊秉綬（一說伊秉綬之孫）創製。傳統正宗版必須有「七寶」——蝦仁、雞蛋、叉燒、青豆、紅蘿蔔丁、火腿粒、冬菇粒。茶餐廳簡化為「四味」（蝦仁、叉燒、雞粒、青豆）以方便量產。
  zh: 扬州炒饭起源于 19 世纪广州，相传由粤菜大师伊秉绶（一说其孙）创制。传统正宗版必备「七宝」——虾仁、鸡蛋、叉烧、青豆、红萝卜丁、火腿粒、冬菇粒。茶餐厅简化为「四味」（虾仁、叉烧、鸡粒、青豆）以便量产。
  en: Yangzhou fried rice traces to 19th-century Canton, attributed to the Qing-dynasty scholar-chef Yi Bingshou (or his grandson, depending on source). The orthodox version contains seven garnishes — shrimp, egg, char siu, peas, diced carrot, ham, mushroom — but tea-restaurants simplified to four (shrimp, char siu, chicken, peas) for high-volume cooking.

names:
  yue_hant: 海南雞喇沙湯米線
  jyutping: hoi2 naam4 gai1 laat6 saa1 tong1 mai5 sin3
  zh: 海南鸡喇沙汤米线
  en: Hainanese-chicken Laksa Vermicelli Soup
category: soup-noodle
ingredients:
  - ref: hainanese-chicken
    qty: 6
    unit: 件
    prep:
      yue: 預先白切嘅海南雞 6 片
      zh: 预先白切的海南鸡 6 片
      en: 6 slices pre-poached Hainanese chicken
  - ref: rice-noodle
    qty: 6
    unit: 兩
    prep:
      yue: 圓米線（laksa 米線）泡軟備用
      zh: 圆米线（laksa 米线）泡软备用
      en: round rice noodles (laksa-style), softened in cold water
  - ref: laksa-paste
    qty: 2
    unit: 匙
    prep:
      yue: 喇沙醬（馬來品牌如 Tean's Gourmet）2 匙
      zh: 喇沙酱（马来品牌如 Tean's Gourmet）2 勺
      en: 2 Tbsp laksa paste (Malaysian brand like Tean's Gourmet)
  - ref: coconut-milk
    qty: 0.2
    unit: 份
    prep:
      yue: 椰漿 100 ml
      zh: 椰浆 100 ml
      en: 100 ml coconut cream
  - ref: turnip
    qty: 2
    unit: 個
    prep:
      yue: 豆卜（油豆腐）2 件、用熱水浸去油
      zh: 豆卜（油豆腐）2 件、用热水浸去油
      en: 2 tofu puffs, briefly soaked in hot water to remove excess oil
  - ref: crab-stick
    qty: 2
    unit: 件
    prep:
      yue: 蟹柳 2 條
      zh: 蟹柳 2 条
      en: 2 imitation crab sticks
  - ref: fish-cake-balls
    qty: 0.5
    unit: 件
    prep:
      yue: 魚蛋 4-5 粒
      zh: 鱼蛋 4-5 颗
      en: 4-5 HK-style fish cake balls

id: rice
sort_order: 30
names:
  yue_hant: 炒飯
  jyutping: caau2 faan6
  zh: 炒饭
  en: Fried Rice
description:
  yue: 粵式炒飯講究「鑊氣」——鑊燒到夠紅，米粒粒粒分明、油潤但唔膩，先夠地道。
  zh: 粤式炒饭强调「镬气」——锅气高温下米粒粒粒分明、油润不腻。
  en: Cantonese fried rice prizes "wok hei" — that elusive char-on-rice flavour from a screaming-hot wok and well-oiled, separated grains.

names:
  yue_hant: 主菜
  jyutping: zyu2 coi3
  zh: 主菜
  en: Mains
description:
  yue: 配飯、配粥、配酒嘅主菜——海南雞飯、椒鹽蝦、咕嚕肉、宮保雞等等，茶餐廳鎮場之選。
  zh: 上桌时配饭、配粥、配酒的主菜——海南鸡饭、椒盐虾、咕嚕肉、宫保鸡等。
  en: Main dishes plated alongside rice or congee — Hainanese chicken rice, salt-and-pepper prawns, sweet-and-sour pork, kung pao chicken and more.
